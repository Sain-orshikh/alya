<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Anime Mood Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🎨 Anime Mood Detector</h1>
            <p>Upload a photo and see what anime character matches your mood!</p>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Upload Section -->
            <div class="upload-section" id="uploadSection">
                <div class="upload-box">
                    <input type="file" id="imageInput" accept="image/*" style="display: none;">
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon">📸</div>
                        <h2>Upload Your Photo</h2>
                        <p>Click to select or drag and drop</p>
                        <button class="btn btn-primary" onclick="document.getElementById('imageInput').click();">
                            Choose Image
                        </button>
                    </div>
                </div>
                <p class="upload-note">Supported formats: JPG, PNG, GIF | Max size: 16MB</p>
            </div>

            <!-- Loading State -->
            <div class="loading-section" id="loadingSection" style="display: none;">
                <div class="spinner"></div>
                <p>Analyzing your mood...</p>
            </div>

            <!-- Results Section -->
            <div class="results-section" id="resultsSection" style="display: none;">
                <!-- Your Face -->
                <div class="result-grid">
                    <div class="result-box">
                        <h3>Your Face</h3>
                        <div class="image-container">
                            <img id="uploadedImage" alt="Uploaded face" style="max-width: 100%; border-radius: 10px;">
                        </div>
                    </div>

                    <!-- Anime Character -->
                    <div class="result-box">
                        <h3>Your Anime Mood</h3>
                        <div class="image-container">
                            <img id="animeImage" alt="Anime character" style="max-width: 100%; border-radius: 10px;">
                        </div>
                    </div>
                </div>

                <!-- Emotion Info -->
                <div class="emotion-info">
                    <div class="emotion-header">
                        <h2 id="emotionName"></h2>
                        <div class="confidence-bar">
                            <div class="confidence-fill" id="confidenceFill"></div>
                            <span id="confidenceText"></span>
                        </div>
                    </div>

                    <!-- Emotion Probabilities -->
                    <div class="probabilities">
                        <h3>Emotion Breakdown</h3>
                        <div id="probabilitiesList"></div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="resetUpload();">
                        Try Another Photo
                    </button>
                </div>
            </div>

            <!-- Error Section -->
            <div class="error-section" id="errorSection" style="display: none;">
                <div class="error-box">
                    <div class="error-icon">⚠️</div>
                    <p id="errorMessage"></p>
                    <button class="btn btn-secondary" onclick="resetUpload();">
                        Go Back
                    </button>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Built with PyTorch, Flask & ❤️</p>
        </footer>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const uploadArea = document.getElementById('uploadArea');
        const uploadSection = document.getElementById('uploadSection');
        const loadingSection = document.getElementById('loadingSection');
        const resultsSection = document.getElementById('resultsSection');
        const errorSection = document.getElementById('errorSection');

        // Drag and drop handlers
        uploadArea.addEventListener('click', () => imageInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                imageInput.files = files;
                handleImageSelected();
            }
        });

        // File input change
        imageInput.addEventListener('change', handleImageSelected);

        function handleImageSelected() {
            const file = imageInput.files[0];
            if (!file) return;

            // Preview uploaded image
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('uploadedImage').src = e.target.result;
            };
            reader.readAsDataURL(file);

            // Upload and process
            uploadImage(file);
        }

        function uploadImage(file) {
            // Show loading
            uploadSection.style.display = 'none';
            errorSection.style.display = 'none';
            loadingSection.style.display = 'flex';
            resultsSection.style.display = 'none';

            const formData = new FormData();
            formData.append('image', file);

            fetch('/api/predict', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    showError(data.error);
                } else {
                    displayResults(data);
                }
            })
            .catch(error => {
                showError('Error uploading image: ' + error.message);
            });
        }

        function displayResults(data) {
            // Hide loading
            loadingSection.style.display = 'none';
            resultsSection.style.display = 'block';

            // Emotion name and confidence
            document.getElementById('emotionName').textContent = data.emotion;
            const confidence = data.confidence;
            document.getElementById('confidenceFill').style.width = (confidence * 100) + '%';
            document.getElementById('confidenceText').textContent = data.confidence_percent;

            // Anime image
            if (data.anime_image) {
                document.getElementById('animeImage').src = 'data:image/jpeg;base64,' + data.anime_image;
            }

            // Probabilities
            const probsList = document.getElementById('probabilitiesList');
            probsList.innerHTML = '';
            data.probabilities.forEach(prob => {
                const div = document.createElement('div');
                div.className = 'probability-item';
                div.innerHTML = `
                    <div class="prob-label">${prob.emotion}</div>
                    <div class="prob-bar">
                        <div class="prob-fill" style="width: ${prob.probability * 100}%"></div>
                    </div>
                    <div class="prob-value">${prob.percentage}</div>
                `;
                probsList.appendChild(div);
            });
        }

        function showError(message) {
            loadingSection.style.display = 'none';
            resultsSection.style.display = 'none';
            errorSection.style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }

        function resetUpload() {
            imageInput.value = '';
            uploadSection.style.display = 'block';
            resultsSection.style.display = 'none';
            errorSection.style.display = 'none';
            loadingSection.style.display = 'none';
        }
    </script>
</body>
</html>
